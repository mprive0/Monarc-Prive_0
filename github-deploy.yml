# ══════════════════════════════════════════════════════════
# MONARC PRIVÉ — GitHub Actions CI/CD Pipeline
# File: .github/workflows/deploy.yml
# Auto-deploys frontend to Vercel, backend to Render
# ══════════════════════════════════════════════════════════

name: Deploy Monarc Privé

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── FRONTEND BUILD & DEPLOY ──────────────────────────────
  deploy-frontend:
    name: Deploy Frontend to Vercel
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Type Check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_STRIPE_PUBLISHABLE_KEY: ${{ secrets.VITE_STRIPE_PUBLISHABLE_KEY }}
          VITE_STRIPE_PRICE_MEMBERSHIP_CURATED: ${{ secrets.VITE_STRIPE_PRICE_MEMBERSHIP_CURATED }}
          VITE_STRIPE_PRICE_MEMBERSHIP_PRIVATE: ${{ secrets.VITE_STRIPE_PRICE_MEMBERSHIP_PRIVATE }}
          VITE_STRIPE_PRICE_HOST_LISTING: ${{ secrets.VITE_STRIPE_PRICE_HOST_LISTING }}
          VITE_STRIPE_PRICE_AGENT_LISTING: ${{ secrets.VITE_STRIPE_PRICE_AGENT_LISTING }}
          VITE_STRIPE_PRICE_EXPERIENCE_LISTING: ${{ secrets.VITE_STRIPE_PRICE_EXPERIENCE_LISTING }}
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        if: github.ref == 'refs/heads/main'
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: "--prod"
          working-directory: ./

  # ── BACKEND BUILD & DEPLOY ───────────────────────────────
  deploy-backend:
    name: Deploy Backend to Render
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: server/package-lock.json

      - name: Install Server Dependencies
        working-directory: server
        run: npm ci

      - name: Build Server
        working-directory: server
        run: npm run build

      - name: Deploy to Render
        if: github.ref == 'refs/heads/main'
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
        # Set RENDER_DEPLOY_HOOK_URL in Render Dashboard → Service → Settings → Deploy Hook
