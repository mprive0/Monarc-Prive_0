# ══════════════════════════════════════════════════════════
# MONARC PRIVÉ — Render Deployment Config
# File: render.yaml
# Defines backend service for Render.com
# ══════════════════════════════════════════════════════════

services:
  - type: web
    name: monarc-prive-api
    runtime: node
    region: oregon  # closest to Scottsdale, AZ
    plan: starter   # $7/month — upgrade to standard for more power
    rootDir: server
    buildCommand: npm install && npm run build
    startCommand: node dist/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: ANTHROPIC_API_KEY
        sync: false   # Set manually in Render dashboard
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: SMTP_HOST
        value: smtp.sendgrid.net
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        value: apikey
      - key: SMTP_PASS
        sync: false
      - key: OWNER_EMAIL
        sync: false
      - key: APP_URL
        value: https://monarcprive.com
      - key: ALLOWED_ORIGINS
        value: https://monarcprive.com,https://www.monarcprive.com
